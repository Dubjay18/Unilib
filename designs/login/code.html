<style>
        body {
            background-color: #fdfbf7;
        }
        .form-input {
            background-color: #fdfbf7;
            border-color: #e6dec9;
        }
        .form-input:focus {
            border-color: #7a1c1c;
            box-shadow: 0 0 0 1px #7a1c1c;
        }
        .card-accent {
            border-left: 6px solid #7a1c1c;
        }
        .toggle-checkbox:checked {
            right: 0;
            border-color: #7a1c1c;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #7a1c1c;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
<div class="text-center mb-8">
<span class="material-symbols-outlined text-primary text-5xl mb-2" data-weight="fill" style="font-variation-settings: 'FILL' 1;">account_balance</span>
<h1 class="font-h2 text-h2 text-primary">UniLibrary</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Academic Portal Access</p>
</div>
<div class="relative bg-surface rounded-xl shadow-[0_4px_20px_rgba(122,28,28,0.05)] border border-[#e6dec9] overflow-hidden" id="auth-container">
<div class="p-8 card-accent transition-transform duration-500 transform translate-x-0" id="login-panel">
<h2 class="font-h3 text-h3 text-on-surface mb-6">Log In</h2>
<form class="space-y-4" onsubmit="event.preventDefault();">
<div>
<label class="block font-meta text-meta text-on-surface-variant mb-1" for="login-email">Institutional Email</label>
<input class="form-input w-full rounded-md font-body-md text-body-md text-on-surface px-4 py-2" id="login-email" placeholder="name@university.edu" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-1">
<label class="block font-meta text-meta text-on-surface-variant" for="login-password">Password</label>
<a class="font-meta text-meta text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<input class="form-input w-full rounded-md font-body-md text-body-md text-on-surface px-4 py-2" id="login-password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary-container text-on-primary rounded-lg py-3 mt-6 font-body-lg text-body-lg font-semibold hover:bg-primary transition-colors shadow-[0_2px_8px_rgba(122,28,28,0.15)]" type="submit">
                        Authenticate
                    </button>
</form>
<p class="mt-6 text-center font-meta text-meta text-on-surface-variant">
                    New scholar? <a class="text-primary font-semibold hover:underline" href="#" onclick="togglePanel('register')">Register here</a>
</p>
</div>
<div class="absolute top-0 left-0 w-full h-full p-8 card-accent bg-surface transition-transform duration-500 transform translate-x-full" id="register-panel">
<div class="flex items-center mb-6">
<button class="mr-3 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePanel('login')">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="font-h3 text-h3 text-on-surface">Register</h2>
</div>
<form class="space-y-4 h-[calc(100%-4rem)] overflow-y-auto pb-4 pr-2" onsubmit="event.preventDefault();">
<div>
<label class="block font-meta text-meta text-on-surface-variant mb-2">Role</label>
<div class="flex bg-surface-container rounded-lg p-1">
<button class="flex-1 py-1.5 rounded-md text-sm font-semibold bg-white shadow-sm text-primary-container" id="btn-student" onclick="setRole('student')" type="button">Student</button>
<button class="flex-1 py-1.5 rounded-md text-sm font-semibold text-on-surface-variant hover:text-primary-container" id="btn-staff" onclick="setRole('staff')" type="button">Staff / Faculty</button>
</div>
</div>
<div>
<label class="block font-meta text-meta text-on-surface-variant mb-1" for="reg-name">Full Name</label>
<input class="form-input w-full rounded-md font-body-md text-body-md text-on-surface px-4 py-2" id="reg-name" placeholder="Jane Doe" type="text"/>
</div>
<div>
<label class="block font-meta text-meta text-on-surface-variant mb-1" for="reg-email">Institutional Email</label>
<input class="form-input w-full rounded-md font-body-md text-body-md text-on-surface px-4 py-2" id="reg-email" placeholder="name@university.edu" type="email"/>
</div>
<div>
<label class="block font-meta text-meta text-on-surface-variant mb-1" for="reg-dept">Department</label>
<select class="form-input w-full rounded-md font-body-md text-body-md text-on-surface px-4 py-2" id="reg-dept">
<option value="">Select Department</option>
<option value="cs">Computer Science</option>
<option value="lit">Literature</option>
<option value="hist">History</option>
<option value="bio">Biology</option>
<option value="math">Mathematics</option>
</select>
</div>
<div>
<label class="block font-meta text-meta text-on-surface-variant mb-1" for="reg-password">Password</label>
<input class="form-input w-full rounded-md font-body-md text-body-md text-on-surface px-4 py-2" id="reg-password" placeholder="Create a strong password" type="password"/>
</div>
<button class="w-full bg-primary-container text-on-primary rounded-lg py-3 mt-6 font-body-lg text-body-lg font-semibold hover:bg-primary transition-colors shadow-[0_2px_8px_rgba(122,28,28,0.15)]" type="submit">
                        Create Account
                    </button>
</form>
</div>
</div>
<div class="mt-8 text-center text-meta font-meta text-outline">
            © 2024 University Library Management System
        </div>
</div>
<script>
        function togglePanel(panel) {
            const login = document.getElementById('login-panel');
            const register = document.getElementById('register-panel');
            
            if (panel === 'register') {
                login.classList.add('-translate-x-full');
                register.classList.remove('translate-x-full');
            } else {
                login.classList.remove('-translate-x-full');
                register.classList.add('translate-x-full');
            }
        }

        function setRole(role) {
            const btnStudent = document.getElementById('btn-student');
            const btnStaff = document.getElementById('btn-staff');

            if (role === 'student') {
                btnStudent.className = 'flex-1 py-1.5 rounded-md text-sm font-semibold bg-white shadow-sm text-primary-container';
                btnStaff.className = 'flex-1 py-1.5 rounded-md text-sm font-semibold text-on-surface-variant hover:text-primary-container';
            } else {
                btnStaff.className = 'flex-1 py-1.5 rounded-md text-sm font-semibold bg-white shadow-sm text-primary-container';
                btnStudent.className = 'flex-1 py-1.5 rounded-md text-sm font-semibold text-on-surface-variant hover:text-primary-container';
            }
        }
    </script>
</body></html>
